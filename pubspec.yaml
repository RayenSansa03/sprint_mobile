name: agrismart_farmer
description: "A Flutter project for AgriSmart Farmer MVP."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.1.0
  
  # Networking
  dio: ^5.4.0
  
  # Models & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # UI & Media
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  fl_chart: ^0.66.0
  camera: ^0.10.5+8
  image_picker: ^1.0.7
  video_player: ^2.8.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  shimmer: ^3.0.0
  maplibre_gl: ^0.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/
